<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8"/>
    <title>LMU TV livetiming</title>

    <meta name="viewport" content="width=100%, height=100%, initial-scale=1.0"/>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script src="styles/js/utils/jquery.js"></script>
    <script src="styles/js/utils/websocket.js"></script>

    <style>
        body
        {
            font-family: "Roboto", sans-serif;
            background-color: rgb(43, 42, 51);
            color: rgb(224, 224, 224);
        }

        table
        {
            border-collapse: collapse;
            width: 100%;
        }

        table thead
        {
            border-bottom: 1px solid rgb(150, 150, 150);
        }

        table td
        {
            text-align: center;
        }

        .raw-color-1
        {
            background-color: rgb(43, 42, 51);
        }

        .raw-color-2
        {
            background-color: rgb(33, 32, 41);
        }
    </style>
</head>
<body>
    <script>
        let content = "";

        function float2int (value)
        {
            return value | 0;
        }

        function LaptimeToString(laptime)
        {
            if (laptime == null || laptime <= 0.1)
            {
                return "--:--:---";
            }

            let m = 0; let s = 0;
            let ms = laptime * 1000.0;

            if (ms >= 1000)
            {
                s = ms / 1000;  // seconds
                ms %= 1000;     // remaining milliseconds

                m = s / 60;     // minutes
                s %= 60;        // remaining seconds
            }

            m  = float2int(m);
            s  = float2int(s);
            ms = float2int(ms);

            const formattedM  =  m.toString().padStart(2, '0');
            const formattedS  =  s.toString().padStart(2, '0');
            const formattedMs = ms.toString().padStart(3, '0');

            return `${formattedM}:${formattedS}:${formattedMs}`;
        }

        function CreateTableRow(value, index, array)
        {
            let ve = value.ve.toFixed(1) + "%";
            let int = value.delta_to_next.toFixed(1);
            let gap = value.delta_to_class_leader.toFixed(1)

            if (value.laps_behind_class_leader > 0)
            {
                gap = value.laps_behind_class_leader + "L";
            }

            if (value.ve < 0.0)
            {
                ve = value.telemetry.fuel.toFixed(1) + "L";
            }

            content += `<tr class="raw-color-${index % 2 + 1}">
                <td>${value.race_position_class}</td>
                <td>${value.vehicle_number}</td>
                <td>${value.vehicle_class}</td>
                <td><img alt="${value.manufacturer}" width="24" src="styles/img/brandlogo/${value.manufacturer}.png"</td>
                <td>${value.driver}</td>
                <td>${value.vehicle_name}</td>
                <td>${value.status}</td>
                <td>${LaptimeToString(value.current_lap)}</td>
                <td>${LaptimeToString(value.last_lap)}</td>
                <td>${LaptimeToString(value.best_lap)}</td>
                <td>${int}</td>
                <td>${gap}</td>
                <td>${ve}</td>
            </tr>`;
        }

        let callBacks =
        {
            onStandingsUpdate : function(data)
            {
                content = "";
                data.forEach(CreateTableRow);

                let table = document.getElementById("livetiming_table");
                table.innerHTML = content;
            },
            onSessionUpdate : function(data)
            {
            },
            onControlsUpdate : function(data)
            {
            },
            onTrackMapUpdate : function(data)
            {
            },
            onOverlayUpdate : function(data)
            {
            }
        };

        let webSocketWrapper = new WebSocketWrapper("ws://" + window.location.hostname + ":6433");
        webSocketWrapper.SetCallback(callBacks);
        webSocketWrapper.Connect();
    </script>

    <table>
        <thead>
        <tr>
            <th>#Pos</th>
            <th>#Vehicle</th>
            <th>Class</th>
            <th>Logo</th>
            <th>Driver</th>
            <th>Team</th>
            <th>Status</th>
            <th>Current Time</th>
            <th>Last Time</th>
            <th>Best Time</th>
            <th>INT</th>
            <th>GAP</th>
            <th>VE/FUEL</th>
        </tr>
        </thead>
        <tbody id="livetiming_table">
        </tbody>
    </table>
</body>
</html>
